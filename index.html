<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toe aan Vakantie</title>
  <link rel="stylesheet" href="tokens.css">
  <style>
    /* ── Font faces ── */
    @font-face {
      font-family: "Anthropic Serif Text";
      src: url("Anthropic-TypeSystem-FontStack-26.043.1/AnthropicSerif-Web/AnthropicSerif-Roman-Web.woff2") format("woff2"),
           url("Anthropic-TypeSystem-FontStack-26.043.1/AnthropicSerif-Web/AnthropicSerif-Roman-Web.woff") format("woff");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: "Anthropic Serif Text";
      src: url("Anthropic-TypeSystem-FontStack-26.043.1/AnthropicSerif-Web/AnthropicSerif-Italic-Web.woff2") format("woff2"),
           url("Anthropic-TypeSystem-FontStack-26.043.1/AnthropicSerif-Web/AnthropicSerif-Italic-Web.woff") format("woff");
      font-weight: 400;
      font-style: italic;
      font-display: swap;
    }
    @font-face {
      font-family: "Anthropic Sans Text";
      src: url("Anthropic-TypeSystem-FontStack-26.043.1/AnthropicSans-Web/AnthropicSans-Roman-Web.woff2") format("woff2"),
           url("Anthropic-TypeSystem-FontStack-26.043.1/AnthropicSans-Web/AnthropicSans-Roman-Web.woff") format("woff");
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: "Anthropic Sans Text";
      src: url("Anthropic-TypeSystem-FontStack-26.043.1/AnthropicSans-Web/AnthropicSans-Italic-Web.woff2") format("woff2"),
           url("Anthropic-TypeSystem-FontStack-26.043.1/AnthropicSans-Web/AnthropicSans-Italic-Web.woff") format("woff");
      font-weight: 100 900;
      font-style: italic;
      font-display: swap;
    }

    /* ── Reset & base ── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-family-body);
      font-size: var(--body-size-md);
      line-height: var(--font-body-md-line-height);
      color: var(--content-base);
      background: var(--surface-neutral-base);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Hero ── */
    .hero {
      background: var(--color-neutral-950);
      color: var(--color-neutral-0);
      padding: var(--spacing-4xl) var(--layout-container-padding) var(--spacing-3xl);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 80%, var(--color-blue-800) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, var(--color-brand-800) 0%, transparent 50%);
      opacity: 0.4;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 720px;
      margin: 0 auto;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-2xs);
      font-size: var(--body-size-xs);
      font-weight: var(--font-weight-medium);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-brand-300);
      margin-bottom: var(--spacing-md);
    }

    .hero-badge::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: var(--radius-circular);
      background: var(--color-brand-400);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .hero h1 {
      font-family: var(--font-family-heading);
      font-size: var(--heading-size-xl);
      line-height: var(--font-heading-xl-line-height);
      font-weight: var(--font-weight-regular);
      margin-bottom: var(--spacing-sm);
    }

    .hero p {
      font-size: var(--body-size-lg);
      line-height: var(--font-body-lg-line-height);
      color: var(--color-neutral-300);
      max-width: 520px;
      margin: 0 auto var(--spacing-lg);
    }

    /* ── Progress bar ── */
    .progress-bar-container {
      max-width: 400px;
      margin: 0 auto;
    }

    .progress-stats {
      display: flex;
      justify-content: space-between;
      font-size: var(--body-size-sm);
      color: var(--color-neutral-400);
      margin-bottom: var(--spacing-2xs);
    }

    .progress-stats .count {
      color: var(--color-neutral-0);
      font-weight: var(--font-weight-semibold);
    }

    .progress-track {
      height: 6px;
      background: var(--color-neutral-800);
      border-radius: var(--radius-circular);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--color-brand-500), var(--color-brand-300));
      border-radius: var(--radius-circular);
      width: 0%;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── Container ── */
    .container {
      max-width: var(--layout-container-max-width);
      margin: 0 auto;
      padding: var(--spacing-xl) var(--layout-container-padding);
    }

    /* ── Category ── */
    .category {
      margin-bottom: var(--spacing-lg);
    }

    .category-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--spacing-sm) 0;
      border-bottom: var(--border-width-sm) solid var(--border-neutral-2);
      cursor: pointer;
      user-select: none;
      transition: border-color 0.2s;
    }

    .category-header:hover {
      border-color: var(--border-neutral-3);
    }

    .category-header-left {
      display: flex;
      align-items: center;
      gap: var(--spacing-xs);
    }

    .category-icon {
      font-size: 24px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface-neutral-1);
      border-radius: var(--radius-md);
      flex-shrink: 0;
    }

    .category-title {
      font-family: var(--font-family-heading);
      font-size: var(--heading-size-xs);
      font-weight: var(--font-weight-medium);
    }

    .category-count {
      font-size: var(--body-size-sm);
      color: var(--content-2);
      font-weight: var(--font-weight-regular);
      margin-left: var(--spacing-2xs);
    }

    .category-chevron {
      width: 20px;
      height: 20px;
      color: var(--content-2);
      transition: transform 0.3s ease;
      flex-shrink: 0;
    }

    .category.open .category-chevron {
      transform: rotate(180deg);
    }

    /* ── Item list ── */
    .category-items {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.35s ease;
    }

    .category.open .category-items {
      grid-template-rows: 1fr;
    }

    .category-items-inner {
      overflow: hidden;
    }

    .item {
      display: flex;
      align-items: center;
      gap: var(--spacing-xs);
      padding: var(--spacing-xs) var(--spacing-sm);
      border-bottom: var(--border-width-sm) solid var(--border-neutral-1);
      transition: background 0.15s;
    }

    .item:hover {
      background: var(--surface-neutral-1);
    }

    .item:last-child {
      border-bottom: none;
    }

    /* ── Custom checkbox ── */
    .checkbox {
      position: relative;
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    .checkbox input {
      position: absolute;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
      margin: 0;
    }

    .checkbox .checkmark {
      width: 22px;
      height: 22px;
      border: var(--border-width-md) solid var(--border-component-neutral-default);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      background: var(--surface-neutral-base);
    }

    .checkbox input:checked + .checkmark {
      background: var(--surface-primary-default);
      border-color: var(--surface-primary-default);
    }

    .checkbox .checkmark svg {
      opacity: 0;
      transform: scale(0.5);
      transition: all 0.2s ease;
    }

    .checkbox input:checked + .checkmark svg {
      opacity: 1;
      transform: scale(1);
    }

    .checkbox input:focus-visible + .checkmark {
      outline: 2px solid var(--border-brand-primary);
      outline-offset: 2px;
    }

    .item-label {
      flex: 1;
      font-size: var(--body-size-md);
      cursor: pointer;
      transition: color 0.2s;
    }

    .item.checked .item-label {
      color: var(--content-2);
      text-decoration: line-through;
      text-decoration-color: var(--border-neutral-3);
    }

    .item-note {
      font-size: var(--body-size-xs);
      color: var(--content-2);
      font-style: italic;
      white-space: nowrap;
    }

    /* ── Actions bar ── */
    .actions {
      display: flex;
      gap: var(--spacing-xs);
      justify-content: center;
      padding: var(--spacing-lg) 0 var(--spacing-xl);
      flex-wrap: wrap;
    }

    .btn {
      font-family: var(--font-family-body);
      font-size: var(--body-size-sm);
      font-weight: var(--font-weight-medium);
      padding: var(--spacing-xs) var(--spacing-md);
      border-radius: var(--radius-circular);
      border: var(--border-width-sm) solid var(--border-neutral-2);
      background: var(--surface-neutral-base);
      color: var(--content-base);
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn:hover {
      background: var(--surface-neutral-1);
      border-color: var(--border-neutral-3);
    }

    .btn-primary {
      background: var(--surface-secondary-default);
      color: var(--content-inverse);
      border-color: var(--surface-secondary-default);
    }

    .btn-primary:hover {
      background: var(--surface-secondary-hover);
      border-color: var(--surface-secondary-hover);
    }

    .btn-danger {
      color: var(--content-component-states-danger);
      border-color: var(--border-component-states-danger);
    }

    .btn-danger:hover {
      background: var(--surface-states-danger);
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: var(--spacing-lg) var(--layout-container-padding);
      border-top: var(--border-width-sm) solid var(--border-neutral-2);
      color: var(--content-2);
      font-size: var(--body-size-sm);
    }

    /* ── Confetti overlay ── */
    .confetti-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1000;
    }

    /* ── Responsive ── */
    @media (max-width: 767px) {
      .hero { padding: var(--spacing-3xl) var(--layout-container-padding) var(--spacing-xl); }
      .hero h1 { font-size: var(--heading-size-lg); line-height: var(--font-heading-lg-line-height); }
      .item-note { display: none; }
    }
  </style>
</head>
<body>

  <!-- Hero -->
  <header class="hero">
    <div class="hero-content">
      <div class="hero-badge">Paklijst 2026</div>
      <h1>Toe aan Vakantie</h1>
      <p>Niet toe aan nog een dag werk, wel toe aan de koffer. Lekker weertje, 20 graden, vooral chillen in het huisje en af en toe erop uit. Vink af wat je hebt ingepakt.</p>
      <div class="progress-bar-container">
        <div class="progress-stats">
          <span><span class="count" id="checked-count">0</span> ingepakt</span>
          <span id="progress-pct">0%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="container">

    <!-- Actions -->
    <div class="actions">
      <button class="btn btn-primary" onclick="toggleAll(true)">Alles aanvinken</button>
      <button class="btn" onclick="expandAll()">Alles uitklappen</button>
      <button class="btn" onclick="collapseAll()">Alles inklappen</button>
      <button class="btn btn-danger" onclick="toggleAll(false)">Alles resetten</button>
    </div>

    <!-- Categories filled by JS -->
    <div id="categories"></div>
  </main>

  <footer>
    Fijn weekend weg! Vergeet je knuffel niet.
  </footer>

  <canvas class="confetti-overlay" id="confetti-canvas"></canvas>

  <script>
    // ── Data ──
    const packingData = [
      {
        icon: "&#128085;",
        title: "Kleding (20&deg;C)",
        items: [
          { name: "Korte broeken", note: "2 stuks" },
          { name: "Lichte lange broek / jeans" },
          { name: "T-shirts", note: "4-5 stuks" },
          { name: "Luchtig shirt / blousje" },
          { name: "Lichte trui of vest", note: "voor 's avonds" },
          { name: "Regenjas of windjack", note: "NL weer blijft NL weer" },
          { name: "Joggingbroek", note: "chillen in het huisje" },
          { name: "Ondergoed", note: "voldoende voor het weekend" },
          { name: "Sokken", note: "meerdere paar" },
          { name: "Pyjama" },
          { name: "Badjas", note: "voor in het huisje" },
          { name: "Sloffen / slippers", note: "binnen" },
          { name: "Sneakers" },
          { name: "Sandalen", note: "als het lekker blijft" },
          { name: "Zwemkleding", note: "voor bad/sauna/zwembad" },
        ]
      },
      {
        icon: "&#127968;",
        title: "Huisje & bed",
        items: [
          { name: "Bedlakens / dekbedovertrek", note: "check of dit al aanwezig is" },
          { name: "Kussensloop" },
          { name: "Handdoek", note: "douche" },
          { name: "Klein handdoekje", note: "gezicht/handen" },
          { name: "Theedoek" },
          { name: "Plaid / dekentje", note: "voor op de bank" },
          { name: "Sfeerlichtjes of kaarsjes" },
        ]
      },
      {
        icon: "&#129528;",
        title: "Knuffels & comfort",
        items: [
          { name: "Knuffel(s)", note: "onmisbaar!" },
          { name: "Favoriete kussen" },
          { name: "Warme sokken", note: "voor op de bank" },
          { name: "Boek / tijdschrift" },
        ]
      },
      {
        icon: "&#127881;",
        title: "Thema-outfit",
        items: [
          { name: '"Nowhere to wear it" thema outfit', note: "hoe gekker hoe beter" },
          { name: "Accessoires bij thema outfit" },
          { name: "Extra tasje voor thema-outfit" },
          { name: "Schoenen die bij het thema passen" },
        ]
      },
      {
        icon: "&#128132;",
        title: "Verzorging & beauty",
        items: [
          { name: "Zonnebrandcrème" },
          { name: "Moisturizer / dagcrème" },
          { name: "Shampoo & conditioner" },
          { name: "Douchegel" },
          { name: "Deodorant" },
          { name: "Tandenborstel & tandpasta" },
          { name: "Haarborstel / kam" },
          { name: "Haarelastiekjes" },
          { name: "Make-up basics" },
          { name: "Make-up remover" },
        ]
      },
      {
        icon: "&#129657;",
        title: "Gezondheid & EHBO",
        items: [
          { name: "Eigen medicijnen" },
          { name: "Paracetamol / ibuprofen" },
          { name: "Pleisters" },
          { name: "Vitamines" },
          { name: "Reiszakje EHBO" },
          { name: "Zonnebril" },
        ]
      },
      {
        icon: "&#128241;",
        title: "Techniek & gadgets",
        items: [
          { name: "Telefoon + oplader" },
          { name: "Powerbank" },
          { name: "Koptelefoon / oordopjes" },
          { name: "Speaker", note: "voor muziek in het huisje" },
          { name: "Camera", note: "optioneel" },
          { name: "E-reader / boek" },
        ]
      },
      {
        icon: "&#128188;",
        title: "Documenten & geld",
        items: [
          { name: "ID-kaart / paspoort" },
          { name: "Pinpas & creditcard" },
          { name: "Contant geld" },
          { name: "Rijbewijs", note: "als je rijdt" },
        ]
      },
      {
        icon: "&#127918;",
        title: "Spelletjes & gezelligheid",
        items: [
          { name: "Kaartspel / bordspel" },
        ]
      },
      {
        icon: "&#128663;",
        title: "Auto & onderweg",
        items: [
          { name: "Snacks voor onderweg" },
          { name: "Water / drinkfles" },
          { name: "Muziek / podcast playlist" },
          { name: "Navigatie / adres huisje" },
        ]
      },
    ];

    // ── State (localStorage) ──
    const STORAGE_KEY = "weekend-weg-paklijst-2026";

    function loadState() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
      } catch { return {}; }
    }

    function saveState(state) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    let state = loadState();

    // ── Render ──
    const categoriesEl = document.getElementById("categories");

    function itemKey(catIdx, itemIdx) {
      return `${catIdx}-${itemIdx}`;
    }

    function totalItems() {
      return packingData.reduce((sum, cat) => sum + cat.items.length, 0);
    }

    function checkedItems() {
      return Object.values(state).filter(Boolean).length;
    }

    function updateProgress() {
      const total = totalItems();
      const checked = checkedItems();
      const pct = total ? Math.round((checked / total) * 100) : 0;
      document.getElementById("checked-count").textContent = checked;
      document.getElementById("progress-pct").textContent = `${pct}%`;
      document.getElementById("progress-fill").style.width = `${pct}%`;

      if (pct === 100) {
        launchConfetti();
      }
    }

    function renderCategories() {
      categoriesEl.innerHTML = "";

      packingData.forEach((cat, catIdx) => {
        const catEl = document.createElement("div");
        catEl.className = "category open";

        const checkedInCat = cat.items.filter((_, i) => state[itemKey(catIdx, i)]).length;

        catEl.innerHTML = `
          <div class="category-header" onclick="this.parentElement.classList.toggle('open')">
            <div class="category-header-left">
              <span class="category-icon">${cat.icon}</span>
              <span class="category-title">${cat.title}</span>
              <span class="category-count">${checkedInCat}/${cat.items.length}</span>
            </div>
            <svg class="category-chevron" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd"/>
            </svg>
          </div>
          <div class="category-items">
            <div class="category-items-inner">
              ${cat.items.map((item, itemIdx) => {
                const key = itemKey(catIdx, itemIdx);
                const isChecked = state[key];
                return `
                  <div class="item ${isChecked ? 'checked' : ''}" data-key="${key}">
                    <label class="checkbox">
                      <input type="checkbox" ${isChecked ? 'checked' : ''} onchange="toggleItem('${key}', this)">
                      <span class="checkmark">
                        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                          <path d="M11.5 3.5L5.5 10L2.5 7" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                      </span>
                    </label>
                    <span class="item-label" onclick="this.previousElementSibling.querySelector('input').click()">${item.name}</span>
                    ${item.note ? `<span class="item-note">${item.note}</span>` : ''}
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        `;

        categoriesEl.appendChild(catEl);
      });

      updateProgress();
    }

    // ── Interactions ──
    function toggleItem(key, checkbox) {
      state[key] = checkbox.checked;
      saveState(state);

      const itemEl = checkbox.closest('.item');
      itemEl.classList.toggle('checked', checkbox.checked);

      // Update category count
      const catEl = itemEl.closest('.category');
      const countEl = catEl.querySelector('.category-count');
      const checks = catEl.querySelectorAll('input[type="checkbox"]');
      const checked = [...checks].filter(c => c.checked).length;
      countEl.textContent = `${checked}/${checks.length}`;

      updateProgress();
    }

    function toggleAll(checked) {
      packingData.forEach((cat, catIdx) => {
        cat.items.forEach((_, itemIdx) => {
          state[itemKey(catIdx, itemIdx)] = checked;
        });
      });
      saveState(state);
      renderCategories();
    }

    function expandAll() {
      document.querySelectorAll('.category').forEach(c => c.classList.add('open'));
    }

    function collapseAll() {
      document.querySelectorAll('.category').forEach(c => c.classList.remove('open'));
    }

    // ── Confetti ──
    function launchConfetti() {
      const canvas = document.getElementById('confetti-canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const particles = [];
      const colors = ['#C96442', '#D97757', '#E39A82', '#4682D5', '#8DC261', '#C49030', '#79AAE4'];

      for (let i = 0; i < 150; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height - canvas.height,
          w: Math.random() * 10 + 4,
          h: Math.random() * 6 + 3,
          color: colors[Math.floor(Math.random() * colors.length)],
          speed: Math.random() * 3 + 2,
          angle: Math.random() * Math.PI * 2,
          spin: (Math.random() - 0.5) * 0.2,
          drift: (Math.random() - 0.5) * 1.5,
        });
      }

      let frame = 0;
      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let alive = false;

        particles.forEach(p => {
          if (p.y < canvas.height + 20) alive = true;
          p.y += p.speed;
          p.x += p.drift;
          p.angle += p.spin;

          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.angle);
          ctx.fillStyle = p.color;
          ctx.globalAlpha = Math.max(0, 1 - p.y / canvas.height);
          ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
          ctx.restore();
        });

        frame++;
        if (alive && frame < 300) {
          requestAnimationFrame(animate);
        } else {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
      }

      animate();
    }

    // ── Init ──
    renderCategories();
  </script>
</body>
</html>
